version: "3.8"

services:
  kitchen-api:
    build: .
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      ORDER_URL: ${ORDER_URL}
      DELIVERY_URL: ${DELIVERY_URL}
      NOTIFICATION_URL: ${NOTIFICATION_URL}
    networks:
      - shoong-network

networks:
  shoong-network:
    external: true